<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1152 738" role="img" aria-label="Monedas minimalistas con flechas de conversión">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fefaf9"/>
      <stop offset="1" stop-color="#fae5e8"/>
    </linearGradient>
    <linearGradient id="coinface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8f9fa"/>
      <stop offset="1" stop-color="#dfe4e9"/>
    </linearGradient>
    <filter id="softblur" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10"/>
    </filter>
  </defs>

  <!-- fondo -->
  <rect width="1152" height="738" fill="url(#bg)"/>

  <!-- sombras -->
  <ellipse cx="700" cy="540" rx="165" ry="20" fill="#dcb4bb" opacity="0.55" filter="url(#softblur)"/>
  <ellipse cx="430" cy="600" rx="195" ry="22" fill="#dcb4bb" opacity="0.5" filter="url(#softblur)"/>

  <!-- moneda de pie -->
  <g>
    <circle cx="700" cy="370" r="155" fill="url(#coinface)" stroke="#aeb8c4" stroke-width="5"/>
    <circle cx="700" cy="370" r="120" fill="none" stroke="#c3ccd6" stroke-width="4"/>
    <text x="700" y="424" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="155" fill="#9aa5b2">$</text>
  </g>

  <!-- pila de monedas -->
  <g>
    <path d="M 270 552 v 26 a 160 46 0 0 0 320 0 v -26" fill="#ccd3db" stroke="#aeb8c4" stroke-width="3"/>
    <ellipse cx="430" cy="552" rx="160" ry="46" fill="#f0f2f4" stroke="#aeb8c4" stroke-width="3"/>

    <path d="M 270 524 v 26 a 160 46 0 0 0 320 0 v -26" fill="#ccd3db" stroke="#aeb8c4" stroke-width="3"/>
    <ellipse cx="430" cy="524" rx="160" ry="46" fill="#f0f2f4" stroke="#aeb8c4" stroke-width="3"/>

    <path d="M 270 496 v 26 a 160 46 0 0 0 320 0 v -26" fill="#ccd3db" stroke="#aeb8c4" stroke-width="3"/>
    <ellipse cx="430" cy="496" rx="160" ry="46" fill="#f3f4f6" stroke="#aeb8c4" stroke-width="3"/>
    <ellipse cx="430" cy="496" rx="118" ry="33" fill="none" stroke="#c3ccd6" stroke-width="3.5"/>
  </g>

  <!-- flechas de conversión -->
  <g stroke="#ea8494" stroke-width="11" fill="none" stroke-linecap="round">
    <path d="M 838 170 a 58 58 0 0 1 96 -14"/>
    <path d="M 942 226 a 58 58 0 0 1 -96 14"/>
  </g>
  <g fill="#ea8494">
    <path d="M 930 138 l 24 24 l -33 8 z"/>
    <path d="M 850 258 l -24 -24 l 33 -8 z"/>
  </g>
</svg>
